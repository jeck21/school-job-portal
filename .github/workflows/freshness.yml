name: Freshness Check

on:
  schedule:
    - cron: '0 8 * * 0'   # Sundays at 8 AM UTC (3-4 AM Eastern)
  workflow_dispatch: {}     # Manual trigger with no inputs

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # Longer timeout -- checks all active jobs
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run freshness check
        run: npx tsx scripts/scrapers/freshness/run.ts
